name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        # npm retired the v1 audit endpoint (410 Gone); pnpm 10 relies on it.
        # Until pnpm updates to bulk advisory endpoint, we soft-gate the audit.
        # Regressions still surface via Dependabot / GitHub Advisory dashboard.
        run: pnpm audit --audit-level=high || echo "::warning::pnpm audit endpoint deprecated (https://github.com/pnpm/pnpm/issues/8418); soft-gated"

      - name: Run enforced validation
        # 비-secret 게이트: schema/types/typecheck/vitest/build 전부.
        # types:check / check:schema-drift 는 SUPABASE_ACCESS_TOKEN 등 secrets가
        # 없으면 graceful skip(exit 0)하므로 PR 머지엔 안전.
        run: |
          pnpm check:migrations
          pnpm check:audit-traceability
          pnpm check:test-coverage
          pnpm check:rehab-integrity
          pnpm check:rule-meta
          pnpm check:ai-guardrails
          pnpm check:navigation-consistency
          pnpm check:schema-drift
          pnpm types:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

  live-integration:
    # Secret-gated: SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY / SUPABASE_TEST_ORG_ID
    # 미설정 시 integration 테스트는 vitest에서 graceful skip되므로 fork PR에서도 무해.
    # 단, secret이 세팅된 환경(main 머지·workflow_dispatch)에서는 실제로 돌면서 검증.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_TEST_ORG_ID: ${{ secrets.SUPABASE_TEST_ORG_ID }}
      SUPABASE_TEST_ACTOR_ID: ${{ secrets.SUPABASE_TEST_ACTOR_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run remote schema drift detector
        run: pnpm check:schema-drift

      - name: Verify Supabase types match remote schema
        run: pnpm types:check

      - name: Run DB-backed integration tests
        run: pnpm test

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 공개 라우트 smoke 테스트. Supabase client 초기화 때문에 NEXT_PUBLIC_*이
    # 정의돼 있어야 next dev가 부팅한다. 이 값들은 이미 배포된 클라이언트 번들에
    # 포함되는 공개 값이므로 secret이 아님. fork PR에서도 동일하게 동작하도록
    # workflow에 하드코딩한다(프로젝트 재배치 시 수정 필요).
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://hyfdebinoirtluwpfmqx.supabase.co
      NEXT_PUBLIC_APP_URL: https://www.veinspiral.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve anon key for public smoke boot
        # NEXT_PUBLIC_SUPABASE_ANON_KEY는 client-side 번들에 그대로 포함되는
        # 공개 JWT라 secret이 아니지만, GH Actions secret에 등록돼 있으면 그 값을
        # 우선 사용. 미등록 시 workflow run은 placeholder로 대체해 dev server 부팅만 통과시킴.
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=anon-placeholder-for-public-smoke-only" >> $GITHUB_ENV
          fi

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run public smoke E2E
        run: pnpm test:e2e:public-smoke

  e2e-production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://hyfdebinoirtluwpfmqx.supabase.co
      NEXT_PUBLIC_APP_URL: https://www.veinspiral.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve anon key for production smoke build
        run: |
          if [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=anon-placeholder-for-prod-smoke-only" >> $GITHUB_ENV
          fi

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run production smoke E2E
        run: pnpm test:e2e:prod-smoke

  e2e-authenticated-production-smoke:
    # 실제 prod 테스트 계정이 필요한 20-test 세트. main push마다 돌리면
    # 계정 상태 drift로 항상 실패 — 수동 트리거 전용으로 운영.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_AUTH_SMOKE_EMAIL: ${{ secrets.E2E_AUTH_SMOKE_EMAIL }}
      E2E_AUTH_SMOKE_PASSWORD: ${{ secrets.E2E_AUTH_SMOKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate authenticated smoke env
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL secret" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret" && exit 1)
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -z "$E2E_AUTH_SMOKE_PASSWORD" ]; then
            echo "Missing SUPABASE_SERVICE_ROLE_KEY secret and E2E_AUTH_SMOKE_PASSWORD secret"
            exit 1
          fi
          if [ -z "$E2E_AUTH_SMOKE_EMAIL" ] && [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing E2E_AUTH_SMOKE_EMAIL secret and no service role is available for auto-discovery"
            exit 1
          fi

      - name: Resolve authenticated smoke account
        run: node --input-type=module -e "import { maskEmail, resolveAuthenticatedSmokeAccount } from './tests/e2e/authenticated-smoke-account.mjs'; const { email, source } = await resolveAuthenticatedSmokeAccount(); console.log('[auth-smoke] resolved ' + source + ' account ' + maskEmail(email));"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run authenticated production smoke E2E
        run: pnpm test:e2e:auth-prod-smoke

  e2e-security-boundary:
    # Secret-gated: 요구 env가 모두 있을 때만 실제 실행. fork PR에서는 spec이 skip.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_SEED_USER_MANAGER_EMAIL: ${{ secrets.E2E_SEED_USER_MANAGER_EMAIL }}
      E2E_SEED_USER_ASSIGNED_EMAIL: ${{ secrets.E2E_SEED_USER_ASSIGNED_EMAIL }}
      E2E_SEED_USER_UNASSIGNED_EMAIL: ${{ secrets.E2E_SEED_USER_UNASSIGNED_EMAIL }}
      E2E_SEED_USER_OTHERORG_EMAIL: ${{ secrets.E2E_SEED_USER_OTHERORG_EMAIL }}
      E2E_SEED_USER_CLIENT_EMAIL: ${{ secrets.E2E_SEED_USER_CLIENT_EMAIL }}
      E2E_SEED_USER_PASSWORD: ${{ secrets.E2E_SEED_USER_PASSWORD }}
      E2E_SEED_USER_MANAGER_PROFILE_ID: ${{ secrets.E2E_SEED_USER_MANAGER_PROFILE_ID }}
      E2E_SEED_USER_ASSIGNED_PROFILE_ID: ${{ secrets.E2E_SEED_USER_ASSIGNED_PROFILE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run security boundary E2E (9 scenarios)
        run: pnpm test:e2e:security-boundary
